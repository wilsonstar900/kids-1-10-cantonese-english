<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="white" />
  <title>Numbers 1–10</title>
  <style>
    /* ── Reset ───────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Disable ALL Safari touch/selection behaviours ───── */
    button, [role="button"], [tabindex] {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      outline: none;
    }

    /* ── Page ────────────────────────────────────────────── */
    html, body {
      width: 100%; height: 100%;
      background: #ffffff;
      color: #000000;
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
      touch-action: manipulation;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
    }

    /* ── Settings button (top-right) ─────────────────────── */
    #settingsBtn {
      position: fixed;
      top: 18px; right: 18px;
      width: 56px; height: 56px;
      border: 2px solid #000;
      border-radius: 50%;
      background: #fff;
      font-size: 26px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 300;
    }
    #settingsBtn:active { background: #f0f0f0; }

    /* ── Number display ──────────────────────────────────── */
    #numberWrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      cursor: pointer;
    }

    #numberEl {
      font-size: clamp(340px, 85vw, 750px);
      font-weight: 900;
      line-height: 1;
      user-select: none;
      -webkit-user-select: none;
      letter-spacing: -0.02em;
    }

    /* pop-in animation */
    @keyframes pop {
      0%   { transform: scale(0.65); opacity: 0.4; }
      70%  { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1);    opacity: 1; }
    }
    #numberEl.pop {
      animation: pop 0.28s cubic-bezier(.34,1.56,.64,1) forwards;
    }

    /* ── Refresh button (fixed bottom-right, 2× settings size) ── */
    #refreshBtn {
      position: fixed;
      bottom: 70px;
      right: 18px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: #000;
      color: #fff;
      border: none;
      font-size: 72px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #refreshBtn:active {
      background: #333;
      transform: scale(0.93);
    }

    /* ── Settings panel (slides in from right) ───────────── */
    #backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.25);
      z-index: 400;
    }
    #backdrop.open { display: block; }

    #settingsPanel {
      position: fixed;
      top: 0; bottom: 0;
      right: -320px;
      width: 300px;
      background: #fff;
      border-left: 2px solid #000;
      z-index: 500;
      transition: right 0.28s ease;
      display: flex;
      flex-direction: column;
      padding: 30px 28px;
      overflow-y: auto;
    }
    #settingsPanel.open { right: 0; }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
    }
    .panel-header h2 {
      font-size: 22px;
      font-weight: 800;
    }
    #closeBtn {
      width: 44px; height: 44px;
      border: 2px solid #000;
      border-radius: 50%;
      background: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    #closeBtn:active { background: #f0f0f0; }

    /* Language radio group */
    .lang-label {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .radio-option {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      border: 2px solid #000;
      border-radius: 14px;
      cursor: pointer;
      font-size: 18px;
      font-weight: 600;
      transition: background 0.1s;
    }
    .radio-option:active { background: #f0f0f0; }
    .radio-option.selected {
      background: #000;
      color: #fff;
    }
    .radio-dot {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2.5px solid currentColor;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .radio-dot::after {
      content: '';
      width: 10px; height: 10px;
      border-radius: 50%;
      background: currentColor;
      display: none;
    }
    .radio-option.selected .radio-dot::after { display: block; }

    .radio-text { display: flex; flex-direction: column; gap: 2px; }
    .radio-sub { font-size: 13px; font-weight: 400; opacity: 0.65; }

    /* ── Settings panel divider + force refresh ──────────── */
    .panel-divider {
      border: none;
      border-top: 1.5px solid #e0e0e0;
      margin: 24px 0;
    }
    .section-label {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    #forceRefreshBtn {
      width: 100%;
      padding: 18px;
      font-size: 20px;
      font-weight: 700;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    #forceRefreshBtn:active {
      background: #333;
      transform: scale(0.97);
    }

    /* ── Random Fonts toggle ──────────────────────────────── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      padding: 4px 0;
      margin-bottom: 20px;
      -webkit-tap-highlight-color: transparent;
    }
    .toggle-text {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .toggle-title {
      font-size: 17px;
      font-weight: 700;
    }
    .toggle-sub {
      font-size: 12px;
      font-weight: 400;
      opacity: 0.55;
    }
    .toggle-switch {
      position: relative;
      width: 52px;
      height: 30px;
      flex-shrink: 0;
    }
    .toggle-switch input {
      position: absolute;
      opacity: 0; width: 0; height: 0;
    }
    .toggle-track {
      position: absolute;
      inset: 0;
      border-radius: 30px;
      border: 2px solid #000;
      background: #fff;
      transition: background 0.2s;
    }
    .toggle-switch input:checked + .toggle-track {
      background: #000;
    }
    .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #000;
      transition: transform 0.2s;
      pointer-events: none;
    }
    .toggle-switch input:checked + .toggle-track + .toggle-thumb {
      transform: translateX(22px);
      background: #fff;
    }
  </style>
</head>
<body>

  <!-- Settings button -->
  <button id="settingsBtn" aria-label="Settings">⚙️</button>

  <!-- Number -->
  <div id="numberWrap" role="button" aria-label="Tap to replay" tabindex="0">
    <span id="numberEl">—</span>
  </div>

  <!-- Refresh button (fixed bottom-right) -->
  <button id="refreshBtn" aria-label="New Number">↻</button>

  <!-- Settings overlay -->
  <div id="backdrop"></div>
  <div id="settingsPanel" role="dialog" aria-label="Settings">
    <div class="panel-header">
      <h2>Language</h2>
      <button id="closeBtn" aria-label="Close settings">✕</button>
    </div>
    <p class="lang-label">Choose audio language:</p>
    <div class="radio-group">
      <div class="radio-option" id="optEnglish" data-lang="english">
        <span class="radio-dot"></span>
        <span class="radio-text">
          English
          <span class="radio-sub">one, two, three…</span>
        </span>
      </div>
      <div class="radio-option" id="optCantonese" data-lang="cantonese">
        <span class="radio-dot"></span>
        <span class="radio-text">
          廣東話
          <span class="radio-sub">一、二、三…</span>
        </span>
      </div>
      <div class="radio-option" id="optMandarin" data-lang="mandarin">
        <span class="radio-dot"></span>
        <span class="radio-text">
          普通話
          <span class="radio-sub">yī、èr、sān…</span>
        </span>
      </div>
    </div>

    <hr class="panel-divider" />

    <p class="section-label">顯示選項：</p>
    <label class="toggle-row" for="randomFontsToggle">
      <span class="toggle-text">
        <span class="toggle-title">隨機字體</span>
        <span class="toggle-sub">Random Fonts · 20 款</span>
      </span>
      <span class="toggle-switch">
        <input type="checkbox" id="randomFontsToggle" />
        <span class="toggle-track"></span>
        <span class="toggle-thumb"></span>
      </span>
    </label>

    <hr class="panel-divider" />

    <p class="section-label">重新載入：</p>
    <button id="forceRefreshBtn">↻ 重新載入</button>
  </div>

<script>
  /* ── Language data ──────────────────────────────────────── */
  const LANG = {
    english: {
      code: 'en-US',
      words: ['', 'one', 'two', 'three', 'four', 'five',
              'six', 'seven', 'eight', 'nine', 'ten']
    },
    cantonese: {
      code: 'zh-HK',
      words: ['', '一', '二', '三', '四', '五',
              '六', '七', '八', '九', '十']
    },
    mandarin: {
      code: 'zh-CN',
      words: ['', '一', '二', '三', '四', '五',
              '六', '七', '八', '九', '十']
    }
  };

  /* ── 20 iOS built-in fonts for numbers ─────────────────── */
  const FONTS = [
    { family: '"Helvetica Neue"',        weight: 900 },
    { family: '"Arial Rounded MT Bold"', weight: 700 },
    { family: 'Futura',                  weight: 700 },
    { family: '"Avenir Next"',           weight: 800 },
    { family: '"Gill Sans"',             weight: 700 },
    { family: 'Optima',                  weight: 700 },
    { family: 'Palatino',                weight: 700 },
    { family: 'Baskerville',             weight: 700 },
    { family: 'Didot',                   weight: 700 },
    { family: 'Georgia',                 weight: 700 },
    { family: '"Times New Roman"',       weight: 700 },
    { family: '"Courier New"',           weight: 700 },
    { family: '"American Typewriter"',   weight: 700 },
    { family: '"Chalkboard SE"',         weight: 700 },
    { family: '"Marker Felt"',           weight: 700 },
    { family: 'Noteworthy',              weight: 700 },
    { family: 'Zapfino',                 weight: 400 },
    { family: 'Copperplate',             weight: 700 },
    { family: 'Rockwell',                weight: 700 },
    { family: 'Impact',                  weight: 400 },
  ];

  /* ── State ──────────────────────────────────────────────── */
  let currentLang        = localStorage.getItem('lang') || 'cantonese';
  let randomFontsEnabled = localStorage.getItem('randomFonts') === 'true';
  let currentNum         = 0;   // 0 = not yet set

  /* ── DOM refs ───────────────────────────────────────────── */
  const numberEl        = document.getElementById('numberEl');
  const refreshBtn      = document.getElementById('refreshBtn');
  const forceRefreshBtn = document.getElementById('forceRefreshBtn');
  const settingsBtn     = document.getElementById('settingsBtn');
  const settingsPanel   = document.getElementById('settingsPanel');
  const backdrop        = document.getElementById('backdrop');
  const closeBtn        = document.getElementById('closeBtn');
  const optEnglish      = document.getElementById('optEnglish');
  const optCantonese    = document.getElementById('optCantonese');
  const optMandarin     = document.getElementById('optMandarin');
  const numberWrap      = document.getElementById('numberWrap');
  const randomFontsToggle = document.getElementById('randomFontsToggle');

  /* ── Voice cache ─────────────────────────────────────────── */
  let cachedVoices = [];

  function loadVoices() {
    const v = speechSynthesis.getVoices();
    if (v.length) cachedVoices = v;
  }
  speechSynthesis.addEventListener('voiceschanged', loadVoices);
  loadVoices();

  // Return a promise that resolves to the voice list.
  // On iOS voices are usually ready after the first user gesture.
  function getVoices() {
    if (cachedVoices.length) return Promise.resolve(cachedVoices);
    return new Promise(resolve => {
      const handler = () => {
        cachedVoices = speechSynthesis.getVoices();
        resolve(cachedVoices);
      };
      speechSynthesis.addEventListener('voiceschanged', handler, { once: true });
      // Hard timeout: give up after 1 s and use whatever is available
      setTimeout(() => resolve(speechSynthesis.getVoices()), 1000);
    });
  }

  // Pick the correct voice without crossing dialect boundaries.
  // iOS voice names:  zh-HK → "Sinji" (Cantonese)
  //                   zh-CN → "Tingting" (Mainland Mandarin)
  //                   zh-TW → "Mei-Jia" (Taiwanese Mandarin)
  function pickVoice(voices, langCode) {
    if (!voices.length) return null;

    // 1. Exact lang-code match
    let v = voices.find(v => v.lang === langCode);
    if (v) return v;

    if (langCode === 'zh-CN') {
      // 2. Known Mandarin voice names (Mainland or Taiwanese)
      v = voices.find(v => /tingting|mei.?jia|mandarin/i.test(v.name));
      if (v) return v;
      // 3. Any zh-TW (Taiwanese Mandarin) — acceptable, NOT zh-HK
      v = voices.find(v => v.lang === 'zh-TW');
      if (v) return v;
      // No Mandarin voice installed — return null; iOS will use utt.lang
      return null;
    }

    if (langCode === 'zh-HK') {
      // 2. Known Cantonese voice name
      v = voices.find(v => /sinji|cantonese/i.test(v.name));
      if (v) return v;
      // 3. Any zh-HK variant
      v = voices.find(v => v.lang.startsWith('zh-HK'));
      if (v) return v;
      return null;
    }

    // English / other — prefix fallback
    const prefix = langCode.split('-')[0];
    return voices.find(v => v.lang.startsWith(prefix)) || null;
  }

  /* ── TTS ────────────────────────────────────────────────── */
  async function speak(n) {
    if (!window.speechSynthesis) return;
    const cfg   = LANG[currentLang];
    const utt   = new SpeechSynthesisUtterance(cfg.words[n]);
    utt.lang    = cfg.code;
    utt.rate    = 0.85;
    utt.pitch   = 1.1;

    const voices = await getVoices();
    const voice  = pickVoice(voices, cfg.code);
    if (voice) utt.voice = voice;

    speechSynthesis.cancel();
    speechSynthesis.speak(utt);
  }

  /* ── Random font ────────────────────────────────────────── */
  function applyRandomFont() {
    const f = FONTS[Math.floor(Math.random() * FONTS.length)];
    numberEl.style.fontFamily = f.family;
    numberEl.style.fontWeight = f.weight;
    numberEl.style.fontSize   = '';   // reset to CSS clamp first
  }
  function resetFont() {
    numberEl.style.fontFamily = '';
    numberEl.style.fontWeight = '';
    numberEl.style.fontSize   = '';
  }

  /* ── Fit number to screen (measure BEFORE animation) ───────
     getBoundingClientRect() includes CSS transforms, so we must
     measure with no transform active (before .pop is added).      */
  function fitToScreen() {
    const availW = window.innerWidth  * 0.84;
    const availH = window.innerHeight * 0.80;   // leave room for refresh btn
    const rect   = numberEl.getBoundingClientRect();
    if (rect.width <= availW && rect.height <= availH) return;

    const scale = Math.min(availW / rect.width, availH / rect.height);
    const cur   = parseFloat(window.getComputedStyle(numberEl).fontSize);
    numberEl.style.fontSize = Math.floor(cur * scale) + 'px';
  }

  /* ── Show number ────────────────────────────────────────── */
  function showNumber(n) {
    currentNum = n;
    if (randomFontsEnabled) applyRandomFont(); else resetFont();
    numberEl.classList.remove('pop');
    void numberEl.offsetWidth;           // flush pending style changes
    numberEl.textContent = n;

    // Measure & fit first (no transform active yet), THEN pop
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        fitToScreen();
        numberEl.classList.add('pop');
      });
    });
    speak(n);
  }

  /* ── Pick a new random (exclude N-1, N, N+1) ────────────── */
  function nextRandom() {
    if (currentNum === 0) {
      // First load — any number is fine
      return Math.floor(Math.random() * 10) + 1;
    }
    const exclude = new Set([currentNum - 1, currentNum, currentNum + 1]);
    const pool = [];
    for (let i = 1; i <= 10; i++) {
      if (!exclude.has(i)) pool.push(i);
    }
    return pool[Math.floor(Math.random() * pool.length)];
  }

  /* ── Settings UI ────────────────────────────────────────── */
  function updateLangUI() {
    optEnglish.classList.toggle('selected',   currentLang === 'english');
    optCantonese.classList.toggle('selected', currentLang === 'cantonese');
    optMandarin.classList.toggle('selected',  currentLang === 'mandarin');
  }

  function openSettings() {
    settingsPanel.classList.add('open');
    backdrop.classList.add('open');
  }

  function closeSettings(replay) {
    settingsPanel.classList.remove('open');
    backdrop.classList.remove('open');
    if (replay && currentNum > 0) speak(currentNum);
  }

  function selectLang(lang) {
    currentLang = lang;
    localStorage.setItem('lang', lang);
    updateLangUI();
  }

  /* ── Event listeners ────────────────────────────────────── */
  refreshBtn.addEventListener('click', () => showNumber(nextRandom()));

  numberWrap.addEventListener('click', () => {
    if (currentNum > 0) speak(currentNum);
  });

  settingsBtn.addEventListener('click', openSettings);
  backdrop.addEventListener('click',   () => closeSettings(false));
  closeBtn.addEventListener('click',   () => closeSettings(true));

  optEnglish.addEventListener('click',   () => selectLang('english'));
  optCantonese.addEventListener('click', () => selectLang('cantonese'));
  optMandarin.addEventListener('click',  () => selectLang('mandarin'));

  randomFontsToggle.addEventListener('change', () => {
    randomFontsEnabled = randomFontsToggle.checked;
    localStorage.setItem('randomFonts', randomFontsEnabled);
    // Apply immediately so the user sees the effect right away
    if (randomFontsEnabled) applyRandomFont(); else resetFont();
  });

  forceRefreshBtn.addEventListener('click', () => {
    location.reload();
  });

  /* Keyboard support (accessibility) */
  numberWrap.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') speak(currentNum);
  });

  /* ── Init ───────────────────────────────────────────────── */
  updateLangUI();
  randomFontsToggle.checked = randomFontsEnabled;

  // iOS requires a user gesture before speaking.
  // On first load we attempt to speak (works on first tap/load in Safari 16+).
  // A small delay lets voices load.
  setTimeout(() => showNumber(nextRandom()), 120);
</script>
</body>
</html>
